{% extends "base.html" %}

{% block title %}contact{% endblock title %}home

{% block body %}
<div class="container-fluid px-0 mb-3">
    <img src="https://loremflickr.com/1200/400/phone" class="d-block w-100 mx-0" alt="...">
</div>
<div class="container mb-3 py-4">
    <h1 class="text-center">Contact us</h1>
    <form method="POST" action="/contact/">
        {% csrf_token %}
        {% comment %} csrf token lagate hai kiyuki jitni bar website khole utni bar hi submit ho zeyada na ho {% endcomment %}
        <div class="form-group">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label for="phone" class="form-label">Phone Numbers</label>
            <input type="phone" class="form-control" id="phone" name="phone" placeholder="Enter your phone number">
        </div>

        <div class="form-group">
            <label for="desc" class="form-label">Tell me about what you want to contact me....</label>
            <textarea class="form-control" id="desc" name="desc" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
{% endblock body %}
